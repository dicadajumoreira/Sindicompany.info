name: Gerar revista (Sindicompany)

# Disparado pelo site quando a editora clica em "Gerar revista":
# POST /repos/.../actions/workflows/generate-revista.yml/dispatches
# body: { ref: "main", inputs: { revista_id: "<UUID>" } }
on:
  workflow_dispatch:
    inputs:
      revista_id:
        description: 'UUID da revista (linha em public.revistas)'
        required: true
        type: string

jobs:
  gerar-pdf:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: revista-engine

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar libs de sistema (WeasyPrint)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 \
            libpangoft2-1.0-0 \
            libharfbuzz0b \
            libcairo2 \
            libgdk-pixbuf-2.0-0 \
            shared-mime-info \
            fonts-liberation \
            fonts-dejavu

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'revista-engine/requirements.txt'

      - name: Instalar dependências Python
        run: pip install -r requirements.txt

      - name: Gerar PDF e atualizar banco
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4o-mini
        run: |
          python -m api.generate --revista-id "${{ inputs.revista_id }}"
